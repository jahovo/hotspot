<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热点图片交互</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  .container {
    position: relative;
    display: inline-block;
    line-height: 0;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 40px rgba(0, 0, 0, 0.5);
  }

  .container img {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
  }

  .hotspot {
    position: absolute;
    z-index: 10;
    cursor: pointer;
  }

  .hotspot-marker {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
    border: 3px solid #3b82f6;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .hotspot-marker::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #3b82f6;
  }

  .hotspot:hover .hotspot-marker,
  .hotspot.active .hotspot-marker {
    transform: scale(1.25);
    box-shadow: 0 0 0 10px rgba(59, 130, 246, 0.25);
  }

  .hotspot-marker::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(59, 130, 246, 0.5);
    animation: pulse 2s ease-out infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  .hotspot-card {
    position: absolute;
    bottom: calc(100% + 16px);
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    padding: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 20;
  }

  .hotspot-card.flip-top {
    bottom: auto;
    top: calc(100% + 16px);
  }

  .hotspot-card.flip-left {
    left: auto;
    right: 0;
    transform: translateX(0);
  }

  .hotspot-card.flip-right {
    left: 0;
    transform: translateX(0);
  }

  .hotspot:hover .hotspot-card,
  .hotspot.active .hotspot-card {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%);
  }

  .hotspot:hover .hotspot-card.flip-left,
  .hotspot.active .hotspot-card.flip-left {
    transform: translateX(0);
  }

  .hotspot:hover .hotspot-card.flip-right,
  .hotspot.active .hotspot-card.flip-right {
    transform: translateX(0);
  }

  .hotspot-card .card-thumb {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 4px;
    margin-bottom: 10px;
    background: #f1f5f9;
  }

  .hotspot-card h3 {
    font-size: 15px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 4px;
  }

  .hotspot-card p {
    font-size: 13px;
    color: #64748b;
    line-height: 1.55;
  }

  .hotspot-card .card-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    color: #3b82f6;
    background: #eff6ff;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 8px;
  }

  .hotspot-card::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: #ffffff;
  }

  .hotspot-card.flip-top::after {
    top: auto;
    bottom: 100%;
    border-top-color: transparent;
    border-bottom-color: #ffffff;
  }

  .qr-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #3b82f6;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 100;
  }

  .qr-toggle:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 24px rgba(59, 130, 246, 0.55);
  }

  .qr-toggle svg {
    width: 22px;
    height: 22px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .qr-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .qr-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .qr-panel {
    background: #ffffff;
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    max-width: 320px;
    width: 90vw;
  }

  .qr-panel h2 {
    font-size: 18px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 6px;
  }

  .qr-panel .qr-subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 20px;
  }

  .qr-panel .qr-img {
    width: 200px;
    height: 200px;
    margin: 0 auto 16px;
    display: block;
  }

  .qr-panel .qr-url {
    font-size: 12px;
    color: #64748b;
    background: #f1f5f9;
    padding: 8px 12px;
    border-radius: 6px;
    word-break: break-all;
    margin-bottom: 16px;
  }

  .qr-panel .qr-close {
    font-size: 13px;
    color: #64748b;
    background: #f1f5f9;
    border: none;
    padding: 8px 24px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .qr-panel .qr-close:hover {
    background: #e2e8f0;
  }
</style>
</head>
<body>
<div class="container" id="container">
  <img src="background.jpg" alt="背景图" id="bgImage">
</div>

<button class="qr-toggle" id="qrToggle" title="扫码在手机上查看">
  <svg viewBox="0 0 24 24">
    <rect x="3" y="3" width="7" height="7" rx="1" />
    <rect x="14" y="3" width="7" height="7" rx="1" />
    <rect x="3" y="14" width="7" height="7" rx="1" />
    <path d="M14 14h3v3h-3z" />
    <path d="M20 14v7h-3" />
    <path d="M14 20h7" />
  </svg>
</button>

<div class="qr-overlay" id="qrOverlay">
  <div class="qr-panel">
    <h2>扫码查看</h2>
    <p class="qr-subtitle">使用手机扫描二维码打开页面</p>
    <img class="qr-img" src="qr.svg" alt="QR Code">
    <div class="qr-url" id="qrUrl">https://jahovo.github.io/hotspot/</div>
    <button class="qr-close" id="qrClose">关闭</button>
  </div>
</div>

<script>
(function() {
  var hotspots = [
    { id: 1, x: 25, y: 30, title: '数据中心 A', desc: '核心计算节点，承载 80% 的业务流量，具备双活容灾能力。', tag: '基础设施' },
    { id: 2, x: 70, y: 22, title: '边缘节点 B', desc: '靠近用户侧的边缘计算集群，延迟低于 5ms，服务华东区域。', tag: '边缘计算' },
    { id: 3, x: 20, y: 72, title: '存储区域 C', desc: '分布式对象存储，总量 2.4PB，支持冷热数据分层与自动归档。', tag: '存储' },
    { id: 4, x: 75, y: 68, title: '网关集群 D', desc: '统一流量入口，日均处理 12 亿次请求，集成 WAF 与限流策略。', tag: '网络' }
  ];

  var container = document.getElementById('container');
  var bgImage = document.getElementById('bgImage');
  var activeHotspot = null;

  function positionCard(hotspotEl, cardEl) {
    var cr = container.getBoundingClientRect();
    var hr = hotspotEl.getBoundingClientRect();
    var cx = hr.left + hr.width / 2 - cr.left;
    var cy = hr.top + hr.height / 2 - cr.top;
    cardEl.classList.remove('flip-top', 'flip-left', 'flip-right');
    if (cy - 180 < 0) cardEl.classList.add('flip-top');
    if (cx + 130 > cr.width) cardEl.classList.add('flip-left');
    else if (cx - 130 < 0) cardEl.classList.add('flip-right');
  }

  function createHotspots() {
    hotspots.forEach(function(h) {
      var el = document.createElement('div');
      el.className = 'hotspot';
      el.style.left = h.x + '%';
      el.style.top = h.y + '%';
      el.style.transform = 'translate(-50%, -50%)';

      var marker = document.createElement('div');
      marker.className = 'hotspot-marker';
      el.appendChild(marker);

      var card = document.createElement('div');
      card.className = 'hotspot-card';
      card.innerHTML = '<h3>' + h.title + '</h3><p>' + h.desc + '</p><span class="card-tag">' + h.tag + '</span>';
      el.appendChild(card);

      el.addEventListener('mouseenter', function() {
        positionCard(el, card);
      });

      el.addEventListener('click', function(e) {
        e.stopPropagation();
        if (activeHotspot === el) {
          el.classList.remove('active');
          activeHotspot = null;
        } else {
          if (activeHotspot) activeHotspot.classList.remove('active');
          positionCard(el, card);
          el.classList.add('active');
          activeHotspot = el;
        }
      });

      container.appendChild(el);
    });
  }

  document.addEventListener('click', function(e) {
    if (activeHotspot && !e.target.closest('.hotspot') && !e.target.closest('.qr-toggle') && !e.target.closest('.qr-overlay')) {
      activeHotspot.classList.remove('active');
      activeHotspot = null;
    }
  });

  // QR code panel
  var qrToggle = document.getElementById('qrToggle');
  var qrOverlay = document.getElementById('qrOverlay');
  var qrClose = document.getElementById('qrClose');

  qrToggle.addEventListener('click', function(e) {
    e.stopPropagation();
    qrOverlay.classList.add('open');
  });

  qrClose.addEventListener('click', function() {
    qrOverlay.classList.remove('open');
  });

  qrOverlay.addEventListener('click', function(e) {
    if (e.target === qrOverlay) qrOverlay.classList.remove('open');
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') qrOverlay.classList.remove('open');
  });

  bgImage.addEventListener('load', createHotspots);
  if (bgImage.complete) createHotspots();
})();
</script>
</body>
</html>
